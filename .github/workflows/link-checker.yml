name: Weekly State SOS Link Checker

on:
  schedule:
    # Run every Monday at midnight UTC (8 PM EST Sunday / 5 PM PST Sunday)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions tab

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run SOS Link Auditor
        run: |
          python check_links.py
